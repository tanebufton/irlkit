# SLS (SRT Live Server, irlserver fork) config.
#
# This fork uses three DISTINCT listener ports per server block — there is no
# single shared "listen" port. Direct SRT and SRTLA-bonded publishers land on
# different ports; SRTLA handling is automatic on listen_publisher_srtla and
# does not apply on listen_publisher.
#
# Publishers:
#   direct SRT:   srt://HOST:4001?streamid=publish/live/<STREAM_KEY>&latency=2000
#   SRTLA bonded: BELABOX/IRL Pro point at the public SRTLA UDP port (5000,
#                 handled by the srtla_rec container); it forwards the
#                 de-bonded stream to this server's listen_publisher_srtla
#                 (4002) internally — never exposed directly.
# OBS pulls the program feed from the player port (4000, internal-only, not
# published to the host):
#   srt://sls:4000?streamid=play/live/<STREAM_KEY>&latency=2000
#
# Note on STREAM_KEY: this config (like this fork's own default example) uses
# `allow publish all` / `allow play all` — the key is obscurity via the
# streamid path, not cryptographic enforcement. Anyone who learns the box's IP
# and a plausible streamid could publish or play. Set `srt_passphrase` below
# (10+ chars) for real enforcement if that's a concern for your deployment;
# the matching passphrase then also needs to be set in the publisher's SRT
# client (most encoder apps support this), which is a deliberate opt-in step,
# not wired up by default here.

srt {
    worker_threads      2;
    worker_connections  300;

    http_port   8181;      # JSON stats consumed by the api + noalbs
    cors_header *;

    log_file  /logs/srt_server.log;
    log_level info;
    pidfile   /tmp/srt_server.pid;

    server {
        listen_player          4000;   # OBS pulls here (internal only)
        listen_publisher       4001;   # direct SRT publishers (public)
        listen_publisher_srtla 4002;   # SRTLA publishers, via srtla_rec (internal only)

        latency_min 200;
        latency_max 5000;

        domain_player     play;
        domain_publisher  publish;
        default_sid       publish/live/feed;

        backlog 100;
        idle_streams_timeout 30;

        app {
            app_player     live;
            app_publisher  live;

            allow publish all;
            allow play all;

            audio_gap_fill true;
        }
    }
}
