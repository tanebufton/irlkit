# SLS (SRT Live Server) config.
#
# Publishers push SRT with streamid:  publish/live/<STREAM_KEY>
#   - single-link SRT: srt://HOST:4001?streamid=publish/live/<key>&latency=2000
#   - SRTLA bonded:     BELABOX/IRL Pro point at the SRTLA UDP port; the srtla
#                       receiver forwards the de-bonded SRT here on :4001.
# OBS pulls the program feed with streamid:  play/live/<STREAM_KEY>
#   - srt://sls:4001?streamid=play/live/<key>&latency=2000
#
# 2000 ms latency is a sane IRL default (buffers cellular jitter); the studio UI
# can surface it but changing it requires matching the publisher.

srt {
    worker_threads      2;
    worker_connections  300;

    http_port   8181;      # JSON stats consumed by the api + noalbs
    cors_header *;

    server {
        listen   4001;
        latency  2000;

        domain_player     play;
        domain_publisher  publish;
        default_sid       publish/live/feed;

        backlog 100;

        app {
            app_player     live;
            app_publisher  live;
        }
    }
}
